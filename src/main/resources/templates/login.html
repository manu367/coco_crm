<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CRM Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-100">

<div class="flex min-h-screen flex-col lg:flex-row">

    <!-- Left Side -->
    <div class="hidden lg:flex lg:w-1/2 bg-gradient-to-br from-blue-700 via-indigo-700 to-slate-900 text-white relative overflow-hidden">

        <!-- Background Circles -->
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-white/10 rounded-full"></div>
        <div class="absolute bottom-0 right-0 w-80 h-80 bg-cyan-400/10 rounded-full"></div>

        <div class="relative z-10 flex flex-col justify-center px-16">

            <div class="mb-8">
          <span class="bg-white/20 px-4 py-2 rounded-full text-sm">
            CRM Platform
          </span>
            </div>

            <h1 class="text-6xl font-bold leading-tight">
                Grow Your Business Smarter
            </h1>

            <p class="mt-6 text-lg text-blue-100 max-w-lg">
                Manage customers, track sales, monitor team performance and automate workflows from one powerful CRM dashboard.
            </p>

            <!-- Stats -->
            <div class="grid grid-cols-3 gap-6 mt-12">

                <div class="bg-white/10 backdrop-blur-sm rounded-2xl p-5">
                    <h3 class="text-3xl font-bold">15K+</h3>
                    <p class="text-sm text-blue-100 mt-1">
                        Customers
                    </p>
                </div>

                <div class="bg-white/10 backdrop-blur-sm rounded-2xl p-5">
                    <h3 class="text-3xl font-bold">98%</h3>
                    <p class="text-sm text-blue-100 mt-1">
                        Success Rate
                    </p>
                </div>

                <div class="bg-white/10 backdrop-blur-sm rounded-2xl p-5">
                    <h3 class="text-3xl font-bold">24/7</h3>
                    <p class="text-sm text-blue-100 mt-1">
                        Support
                    </p>
                </div>

            </div>

        </div>

    </div>

    <!-- Right Side Login -->
    <div class="w-full lg:w-1/2 bg-white flex items-center justify-center px-6 py-12">

        <div class="w-full max-w-md">

            <div class="mb-10">

                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-xl bg-blue-600 flex items-center justify-center text-white font-bold text-xl">
                        C
                    </div>

                    <div>
                        <h2 class="font-bold text-xl">
                            CRM Dashboard
                        </h2>
                        <p class="text-sm text-gray-500">
                            Sign in to continue
                        </p>
                    </div>
                </div>

            </div>

            <form class="space-y-5">

                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Email Address
                    </label>

                    <input
                            type="email"
                            placeholder="name@example.com"
                            class="w-full h-14 px-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"
                    />
                </div>

                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Password
                    </label>

                    <input
                            type="password"
                            placeholder="••••••••"
                            class="w-full h-14 px-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"
                    />
                </div>

                <div class="flex justify-between items-center">

                    <label class="flex items-center gap-2 text-sm text-gray-600">
                        <input type="checkbox">
                        Remember me
                    </label>

                    <a href="#" class="text-blue-600 text-sm font-medium">
                        Forgot Password?
                    </a>

                </div>

                <button
                        class="w-full h-14 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-semibold transition"
                >
                    Login to Dashboard
                </button>

            </form>

            <div class="mt-10 border-t pt-6">

                <p class="text-center text-sm text-gray-500">
                    © 2026 CRM Management System
                </p>

            </div>

        </div>
    </div>
</div>
</body>
</html>
