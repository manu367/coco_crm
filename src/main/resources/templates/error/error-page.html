<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-2xl p-8 max-w-lg w-full text-center">

    <div class="mb-4">
        <svg class="w-16 h-16 mx-auto text-red-500"
             fill="none"
             stroke="currentColor"
             viewBox="0 0 24 24">
            <path stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 9v2m0 4h.01M5.07 19H18.93C20.54 19 21.55 17.27 20.76 15.86L13.83 3.86C13.03 2.46 10.97 2.46 10.17 3.86L3.24 15.86C2.45 17.27 3.46 19 5.07 19z">
            </path>
        </svg>
    </div>

    <h1 class="text-3xl font-bold text-gray-800 mb-4">
        Something Went Wrong
    </h1>

    <div class="bg-red-50 border border-red-200 rounded-lg p-4">
        <p class="text-red-700 font-medium" th:text="${errorMessage}">
            Error Message
        </p>
    </div>

    <a href="/"
       class="inline-block mt-6 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
        Back to Home
    </a>

</div>

</body>
</html>
