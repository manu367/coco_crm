<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar{
            width:6px;
        }

        ::-webkit-scrollbar-track{
            background:transparent;
        }

        ::-webkit-scrollbar-thumb{
            background:#334155;
            border-radius:20px;
        }
        .activeNav{
            background:white !important;
            color:black !important;
            font-weight:600;
            transform:translateX(5px);
            box-shadow:0 8px 20px rgba(255,255,255,.15);
        }

    </style>
</head>
<body class="bg-slate-100 overflow-hidden">

<div class="flex h-screen overflow-hidden min-h-0">
    <div id="overlay"
         class="fixed inset-0 bg-black/50 hidden lg:hidden z-40">
    </div>
    <div th:replace="~{fragments/adminSidebar::adminSidebar}"></div>
    <!-- Main Area -->
    <div class="flex-1 flex flex-col overflow-hidden min-h-0">

        <!-- Navbar -->
        <header class="bg-white shadow-sm flex-shrink-0">

            <div class="flex items-center justify-between px-4 md:px-6 py-4">

                <div class="flex items-center gap-4">

                    <button id="menuBtn"
                            class="lg:hidden text-2xl">
                        ☰
                    </button>

                    <h2 class="text-lg md:text-xl font-semibold">
                        Dashboard
                    </h2>

                </div>

                <div class="flex items-center gap-3 md:gap-4">

                    <button class="relative">

                        🔔

                        <span class="absolute -top-2 -right-2 bg-red-500 text-white text-xs px-1 rounded-full">
                            5
                        </span>

                    </button>

                    <div class="flex items-center gap-2">

                        <img
                                src="https://ui-avatars.com/api/?name=Admin"
                                class="w-9 h-9 rounded-full"
                                alt="">

                        <span class="hidden sm:block font-medium">
                            Admin
                        </span>

                    </div>

                </div>

            </div>

        </header>

        <!-- Scrollable Content -->
        <main class="flex-1 overflow-y-auto min-h-0 p-4 md:p-6">

            <!-- Cards -->
            <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 md:gap-6">

                <div class="bg-white rounded-xl p-6 shadow">
                    Users
                </div>

                <div class="bg-white rounded-xl p-6 shadow">
                    Orders
                </div>

                <div class="bg-white rounded-xl p-6 shadow">
                    Revenue
                </div>

                <div class="bg-white rounded-xl p-6 shadow">
                    Products
                </div>

            </div>

            <!-- Table -->
            <div class="bg-white rounded-xl shadow mt-6">

                <div class="p-5 border-b">

                    <h3 class="font-semibold">
                        Recent Orders
                    </h3>

                </div>

                <div class="overflow-x-auto">

                    <table class="w-full min-w-[700px]">

                        <!-- table data -->

                    </table>

                </div>

            </div>

        </main>

    </div>

</div>

<script>
    const menuBtn = document.getElementById("menuBtn");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");

    menuBtn.addEventListener("click", () => {

        sidebar.classList.toggle("-translate-x-full");

        if(sidebar.classList.contains("-translate-x-full")){
            overlay.classList.add("hidden");
        }else{
            overlay.classList.remove("hidden");
        }

    });

    overlay.addEventListener("click", () => {

        sidebar.classList.add("-translate-x-full");
        overlay.classList.add("hidden");

    });


    document.querySelectorAll(".menu-toggle").forEach(toggle => {

        toggle.addEventListener("click", () => {

            const submenu =
                toggle.parentElement.querySelector(".submenu");

            const arrow =
                toggle.querySelector(".arrow");

            document.querySelectorAll(".submenu").forEach(item => {

                if(item !== submenu){

                    item.style.maxHeight = null;

                    item.parentElement
                        .querySelector(".arrow")
                        ?.classList.remove("rotate-180");

                }

            });

            if(submenu.style.maxHeight){

                submenu.style.maxHeight = null;
                arrow.classList.remove("rotate-180");

            }else{

                submenu.style.maxHeight =
                    submenu.scrollHeight + "px";

                arrow.classList.add("rotate-180");

            }

        });

    });


    const navLinks =
        document.querySelectorAll(".nav-link");

    navLinks.forEach(link => {

        link.addEventListener("click", function(){

            navLinks.forEach(item =>
                item.classList.remove("activeNav")
            );

            this.classList.add("activeNav");

            if(window.innerWidth < 1024){

                sidebar.classList.add("-translate-x-full");
                overlay.classList.add("hidden");

            }

        });

    });
</script>

</body>
</html>
