<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar{
            width:6px;
        }

        ::-webkit-scrollbar-track{
            background:transparent;
        }

        ::-webkit-scrollbar-thumb{
            background:#334155;
            border-radius:20px;
        }
        .activeNav{
            background:white !important;
            color:black !important;
            font-weight:600;
            transform:translateX(5px);
            box-shadow:0 8px 20px rgba(255,255,255,.15);
        }

    </style>
</head>
<body class="bg-slate-100 overflow-hidden">

<div class="flex h-screen overflow-hidden min-h-0">
    <div id="overlay"
         class="fixed inset-0 bg-black/50 hidden lg:hidden z-40">
    </div>
    <div th:replace="~{fragments/adminSidebar::adminSidebar}"></div>
    <!-- Main Area -->
    <div class="flex-1 flex flex-col overflow-hidden min-h-0">
        <div th:replace="~{fragments/adminheader::adminheader}"></div>
        <!-- Scrollable Content -->
        <main class="flex-1 overflow-y-auto min-h-0 p-4 md:p-6">

            <!--           yha main content aayega hamara-->

        </main>

    </div>

</div>
<div th:replace="~{fragments/adminFooter::adminFooter}"></div>


</body>
</html>
