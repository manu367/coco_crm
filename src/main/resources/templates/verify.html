<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verified | CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100">

<div class="flex items-center justify-center min-h-screen px-6">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-lg p-8 text-center">

        <!-- Success Icon -->
        <div class="mx-auto w-24 h-24 rounded-full bg-green-100 flex items-center justify-center mb-6">

            <svg xmlns="http://www.w3.org/2000/svg"
                 class="w-12 h-12 text-green-600"
                 fill="none"
                 viewBox="0 0 24 24"
                 stroke="currentColor">

                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M5 13l4 4L19 7"/>
            </svg>

        </div>

        <h1 class="text-3xl font-bold text-slate-900">
            Email Verified Successfully
        </h1>

        <p class="mt-4 text-gray-600 leading-relaxed">
            Your email address has been successfully verified.
            You can now access all CRM features and continue to your dashboard.
        </p>

        <div class="mt-8 space-y-4">

            <a href="login.html"
               class="flex items-center justify-center w-full h-14 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-semibold transition">
                Login to Account
            </a>

            <a href="index.html"
               class="flex items-center justify-center w-full h-14 border border-slate-300 rounded-xl font-medium text-slate-700 hover:bg-slate-50 transition">
                Go to Home
            </a>

        </div>

        <div class="mt-6 bg-green-50 border border-green-200 rounded-xl p-4">
            <p class="text-sm text-green-700">
                ✓ Verification completed successfully.
            </p>
        </div>

        <div class="mt-8 border-t pt-6">
            <p class="text-sm text-gray-500">
                © 2026 CRM Management System
            </p>
        </div>

    </div>

</div>

</body>
</html>
